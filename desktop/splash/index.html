<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>SmartDocs</title>
  <style>
    :root { --bg:#0f1115; --fg:#e6e9ef; --muted:#9aa4b2; --accent:#4c8bf5; --bad:#f85149; }
    * { box-sizing:border-box; }
    body { margin:0; height:100vh; display:grid; place-items:center;
           background:var(--bg); color:var(--fg);
           font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; }
    .box { text-align:center; max-width:480px; padding:24px; }
    h1 { font-size:22px; margin:0 0 6px; }
    .tag { color:var(--muted); font-size:13px; margin-bottom:26px; }
    .spinner { width:34px; height:34px; margin:0 auto 18px; border-radius:50%;
               border:3px solid #2a2f3a; border-top-color:var(--accent);
               animation:spin 0.9s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    #status { color:var(--muted); font-size:14px; min-height:20px; }
    #status.error { color:var(--bad); white-space:pre-wrap; }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner" id="spinner"></div>
    <h1>SmartDocs</h1>
    <div class="tag">offline-first document AI</div>
    <div id="status" role="status" aria-live="polite">Starting local backend…</div>
  </div>
  <script src="splash.js"></script>
</body>
</html>
