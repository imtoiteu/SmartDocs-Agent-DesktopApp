name: desktop-build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-22.04
            bundles: deb
          - name: macos
            os: macos-14
            bundles: app,dmg
          - name: windows
            os: windows-2022
            bundles: msi,nsis
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Linux system dependencies (Tauri v2 / WebKitGTK)
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl \
            wget file libxdo-dev libssl-dev libayatana-appindicator3-dev \
            librsvg2-dev

      # PyInstaller cannot cross-compile — the sidecar is built natively on
      # each runner OS. This is the whole point of the matrix.
      - name: Build Python sidecar (native)
        shell: bash
        run: scripts/build-sidecar.sh

      - name: Unit + desktop-mode test suites
        shell: bash
        run: |
          set -e
          for f in agent/tests/test_*.py; do python3 "$f"; done

      - name: UI logic tests (sidebar / Local-only state)
        run: node --test desktop/tests/ui/

      - name: UI gateway tests (local UI, proxy allowlist, remote mode)
        shell: bash
        run: python3 desktop/tests/test_gateway.py

      - name: Rust shell unit tests (runtime modes)
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Sidecar integration tests (against the packaged binary)
        if: matrix.name != 'windows'   # Windows path/signal semantics: run planned, not yet validated
        shell: bash
        run: |
          export SMARTDOCS_SIDECAR_CMD="$PWD/desktop/sidecar/dist/smartdocs-sidecar/smartdocs-sidecar"
          python3 desktop/tests/test_sidecar_integration.py

      - name: npm install
        run: npm install --no-audit --no-fund

      - name: Generate icons
        shell: bash
        run: |
          node desktop/gen-icon.js
          npx tauri icon desktop/icon.png

      - name: Tauri build
        run: npx tauri build --bundles ${{ matrix.bundles }}

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: smartdocs-desktop-${{ matrix.name }}
          path: |
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app/**
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
          if-no-files-found: error
